[build]
publish = "/home/crash/projects/h2oflows/web/dist"
publishOrigin = "config"
commandOrigin = "config"
command = "npm run generate"

[build.environment]
NUXT_PUBLIC_API_BASE = "https://api.h2oflows.app"
NODE_VERSION = "20"

[build.processing]

[build.processing.css]

[build.processing.html]

[build.processing.images]

[build.processing.js]

[build.services]

[[headers]]
for = "/_nuxt/builds/meta/*"

[headers.values]
cache-control = "public, max-age=31536000, immutable"

[[headers]]
for = "/_nuxt/builds/*"

[headers.values]
cache-control = "public, max-age=1, immutable"

[[headers]]
for = "/_fonts/*"

[headers.values]
cache-control = "public, max-age=31536000, immutable"

[[headers]]
for = "/_nuxt/*"

[headers.values]
